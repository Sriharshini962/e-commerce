<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanMart - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f5f7fb;
        }
        .navbar {
            background: #1a1a2e;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo a {
            color: #f97316;
            font-size: 1.8rem;
            font-weight: 800;
            text-decoration: none;
        }
        .logo span {
            color: white;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
        }
        .register-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .register-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .register-header i {
            font-size: 3rem;
            color: #f97316;
            margin-bottom: 1rem;
        }
        .register-header h2 {
            font-size: 1.8rem;
            color: #1a1a2e;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1a1a2e;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .terms {
            display: flex;
            gap: 10px;
            margin: 1rem 0;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-register:hover {
            background: #ea580c;
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .login-link a {
            color: #f97316;
            text-decoration: none;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
        }
        footer {
            background: #1a1a2e;
            color: #94a3b8;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo"><a href="index.html">Urban<span>Mart</span></a></div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <i class="fas fa-user-circle"></i>
            <h2>Create Account</h2>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" name="phone">
            </div>
            
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirm_password" required>
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" name="gender">
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label>I agree to Terms & Conditions</label>
            </div>
            
            <button type="submit" class="btn-register">Create Account</button>
            <div id="message"></div>
        </form>
        
        <div class="login-link">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2025 UrbanMart. All rights reserved.</p>
</footer>

<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    const gender = document.getElementById('gender').value;
    const terms = document.getElementById('terms').checked;
    
    if (!fullname) {
        showMessage('Please enter your name', 'error');
        return;
    }
    if (!email) {
        showMessage('Please enter email', 'error');
        return;
    }
    if (!password) {
        showMessage('Please enter password', 'error');
        return;
    }
    if (password.length < 4) {
        showMessage('Password must be at least 4 characters', 'error');
        return;
    }
    if (password !== confirm) {
        showMessage('Passwords do not match', 'error');
        return;
    }
    if (!terms) {
        showMessage('Please accept terms', 'error');
        return;
    }
    
    const formData = new FormData();
    formData.append('fullname', fullname);
    formData.append('email', email);
    formData.append('phone', phone);
    formData.append('password', password);
    formData.append('gender', gender);
    
    const btn = document.querySelector('.btn-register');
    btn.innerHTML = 'Creating...';
    btn.disabled = true;
    
    try {
        const response = await fetch('register.php', {
            method: 'POST',
            body: formData
        });
        const result = await response.json();
        
        if (result.success) {
            showMessage(result.message, 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            showMessage(result.message, 'error');
            btn.innerHTML = 'Create Account';
            btn.disabled = false;
        }
    } catch(error) {
        showMessage('Something went wrong', 'error');
        btn.innerHTML = 'Create Account';
        btn.disabled = false;
    }
});

function showMessage(msg, type) {
    const div = document.getElementById('message');
    div.innerHTML = msg;
    div.className = type === 'success' ? 'success-msg' : 'error-msg';
    setTimeout(() => {
        div.innerHTML = '';
    }, 3000);
}
</script>
</body>
</html>
